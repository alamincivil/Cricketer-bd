  <!-- Cricket Bat -->
  <rect x="680" y="250" width="40" height="250" rx="5" fill="#f5f5f5" transform="rotate(15 700 375)"/>
  <rect x="695" y="200" width="10" height="60" fill="#8B4513" transform="rotate(15 700 375)"/>
  
  <!-- Text -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">Cricketer.bd</text>
